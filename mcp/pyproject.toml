[tool.uv.workspace]
members = [
    "mcp-lms",
    "mcp-holidays",
]

[dependency-groups]
dev = ["poethepoet>=0.40.0", "pyright==1.1.408"]

[tool.poe.tasks]

[tool.poe.tasks.check]
help = "Run Python typechecks"
sequence = ["pyright-check"]

[tool.poe.tasks.pyright-check]
help = "Run pyright on Python packages"
cmd = "pyright"

[tool.pyright]
include = [
    "mcp-lms",
    "mcp-holidays",
]
extraPaths = [
    "mcp-lms/src",
    "mcp-holidays/src",
]
exclude = ["**/__pycache__", "**/.*", "**/node_modules", ".venv"]
typeCheckingMode = "strict"
reportUnknownMemberType = "none"
reportMissingTypeStubs = "none"
